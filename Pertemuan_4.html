<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;

.container{
    width:80%;
    margin:auto;
    text-align:center;
    margin-top:40px;
}

h1{
    color:#333;
}

p{
    color:#555;
}

button{
    background:#3498db;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

/* tombol link */
.ig-link{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#e1306c;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.ig-link:hover{
    background:#c72b61;
}

/* STYLE TABEL */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th{
    background:#3498db;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f1f1;
}
</style>

</head>
